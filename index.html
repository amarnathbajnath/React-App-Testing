<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body onload="loadInitialData()">

    <!-- Top Right Status Section -->
    <header class="status-section">
        <div id="status-container">
            <p id="sheet-status">Initializing...</p>
        </div>
        <button id="refresh-btn" aria-label="Reload Google Sheet Data">
            🔄 Refresh Data
        </button>
    </header>

    <!-- 
        ====================================================
        SCOPE OF WORK BLOCK 
        ====================================================
    -->
    <section class="info-block" id="scope-block-container">
        
        <!-- Customer Info & Job Details (Kept as is) -->
        <!-- ... (Customer Info Section code remains here) ... -->
        <section class="info-section customer-info">
            <h2>Customer Information</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="customer-name">Customer Name:</label>
                    <input type="text" id="customer-name" value="Acme Corp">
                </div>
                <div class="form-group">
                    <label for="quote-number">Quote No.:</label>
                    <input type="text" id="quote-number" value="Q-2026-001">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group full-width">
                    <label for="customer-address">Address:</label>
                    <textarea id="customer-address" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="date">Date:</label>
                    <input type="date" id="date" value="2026-06-12">
                </div>
            </div>
        </section>

        <section class="info-section job-details">
            <h2>Scope of Work / Job Details</h2>
            <textarea id="scope-of-work" rows="10"></textarea>
        </section>

        <!-- 3. Material List (SEARCH TOOL) -->
        <section class="info-section material-list-section">
            <h2>🔍 Material Search</h2>
            <div class="material-search-area">
                <input type="text" id="material-search-input" placeholder="Search by SKU or Item Description..." onkeyup="searchMaterials()">
                <button onclick="searchMaterials()">Search</button>
            </div>

            <!-- Table to display searched results -->
            <div class="table-wrapper">
                <table id="material-search-table">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Qty</th>
                            <th>Unit Type</th>
                            <th>Item Name</th>                            
                            <th>Unit Cost</th>                            
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="search-results-body">
                        <!-- Dynamic search rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 4. Final Material List (ADDED ITEMS) -->
        <section class="info-section material-list-section">
            <h2>🛒 Final Material List (Added Items)</h2>
            <div class="table-wrapper">
                <table id="final-material-list-table">
                    <thead class="final-header">
                        <tr>
                            <th>SKU</th>
                            <th>Qty</th>
                            <th>Unit Type</th>
                            <th>Item Name</th>                            
                            <th>Unit Cost</th>                            
                            <th>Total Cost</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="final-materials-body">
                        <!-- Dynamic final rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 5. Add Items Section (Manual Entry) -->
        <section class="info-section add-item-section">
            <h2>+ Add Item Manually</h2>
            <form id="add-item-form">
                <div class="form-row add-item-inputs">
                    <div class="form-group">
                        <label for="temp-sku">Temp SKU:</label>
                        <input type="text" id="temp-sku" placeholder="TMP-001">
                    </div>
                    <div class="form-group">
                        <label for="add-qty">Quantity:</label>
                        <input type="number" id="add-qty" placeholder="1" min="1">
                    </div>
                    <div class="form-group">
                        <label for="add-unit-type">Unit Type:</label>
                        <input type="text" id="add-unit-type" placeholder="EA / Meter">
                    </div>
                    <div class="form-group">
                        <label for="add-item-name">Item Name:</label>
                        <input type="text" id="add-item-name" placeholder="Description">
                    </div>
                    <div class="form-group">
                        <label for="add-unit-cost">Unit Cost:</label>
                        <input type="number" id="add-unit-cost" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <button type="button" onclick="addItemToTable()">Add Item</button>
                    </div>
                </div>
            </form>
        </section>
    </section> 

    <!-- Main Content Area -->
    <main id="dashboard-main">
        <h1 class="main-title">Quote Builder</h1>
    </main>

    <script src="script.js"></script> <!-- Separate file for cleaner structure -->

</body>
</html>
