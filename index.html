<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initializeApp()">

    <!-- Top Right Status Section -->
    <header class="status-section">
        <div id="status-container">
            <p id="sheet-status">Initializing...</p>
        </div>
        <button id="refresh-btn" aria-label="Reload Google Sheet Data">
            🔄 Refresh Data
        </button>
    </header>

    <!-- -------------------------------------------------- -->
    <!-- CUSTOMER INFO SECTION (Step 2) -->
    <!-- -------------------------------------------------- -->
    <section class="info-section customer-info">
        <h2>Customer Information</h2>
        <div class="form-row">
            <div class="form-group">
                <label for="customer-name">Customer Name:</label>
                <input type="text" id="customer-name" value="Acme Corp">
            </div>
            <div class="form-group">
                <label for="quote-number">Quote No.:</label>
                <input type="text" id="quote-number" value="Q-2026-001">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group full-width">
                <label for="customer-address">Address:</label>
                <textarea id="customer-address" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label for="date">Date:</label>
                <input type="date" id="date" value="2026-06-12">
            </div>
        </div>
    </section>

    <!-- -------------------------------------------------- -->
    <!-- SCOPE OF WORK SECTION (Step 3) -->
    <!-- -------------------------------------------------- -->
    <section class="info-section job-details">
        <h2>Scope of Work / Job Details</h2>
        <textarea id="scope-of-work" rows="10" placeholder="Describe the detailed requirements, tasks, and deliverables for this project."></textarea>
    </section>

    <!-- -------------------------------------------------- -->
    <!-- MATERIAL LIST & ADD ITEMS SECTION (Steps 4 & 5) -->
    <!-- -------------------------------------------------- -->
    <section class="info-section material-management">
        <h2>Material List</h2>
        
        <!-- Search Bar (Step 4) -->
        <div class="search-area">
            <input type="text" id="sku-search" placeholder="Search by SKU or Item Description...">
        </div>

        <!-- Material Table (Step 4 Output) -->
        <div class="table-container">
            <table id="material-table">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Item Name</th>
                        <th>Unit Type</th>
                        <th>Qty</th>
                        <th>Unit Cost</th>
                        <th>Total Cost</th>
                    </tr>
                </thead>
                <tbody id="material-table-body">
                    <!-- Rows will be generated by JavaScript -->
                    <tr><td colspan="6" style="text-align: center; color: #999;">No materials added yet.</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Add New Item Form (Step 5) -->
        <div class="add-item-form">
            <h3>Add Custom Item Manually</h3>
            <div class="form-row add-item-row">
                <div class="form-group">
                    <label for="temp-sku">Temp SKU</label>
                    <input type="text" id="temp-sku" placeholder="TMP-001">
                </div>
                <div class="form-group">
                    <label for="add-qty">Quantity</label>
                    <input type="number" id="add-qty" value="1" min="1">
                </div>
                <div class="form-group">
                    <label for="add-unit-type">Unit Type</label>
                    <input type="text" id="add-unit-type" placeholder="pcs/meter/hour">
                </div>
                <div class="form-group">
                    <label for="add-item-name">Item Name</label>
                    <input type="text" id="add-item-name" placeholder="Product Name">
                </div>
                <div class="form-group">
                    <label for="add-unit-cost">Unit Cost ($)</label>
                    <input type="number" id="add-unit-cost" value="0.00" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <button id="add-item-btn" class="action-btn">Add Item</button>
                </div>
            </div>
        </div>
    </section>
    
    <!-- -------------------------------------------------- -->
    <!-- TEMPLATE CLONING BUTTON (Step 6) -->
    <!-- -------------------------------------------------- -->
    <button id="add-template-btn" class="template-button">
        + Add New Quote Template Block
    </button>


    <!-- Script Logic (The brain of the dashboard) -->
    <script src="app.js"></script> 
</body>
</html>
