<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Quotation Generator</title>
    <!-- Tailwind CSS CDN for utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar Styling (Optional) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; /* Slate-300 */
            border-radius: 4px;
        }

        /* Style for the suggestions dropdown */
        #material_suggestions {
            max-height: 300px; /* Limit height for scrollability */
            overflow-y: auto;
        }
    </style>
</head>

<body class="bg-gray-50 p-8">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-lg p-8 space-y-10">
        <h1 class="text-3xl font-bold text-indigo-700 border-b pb-4 mb-6">Quotation Generation Tool</h1>

        <!-- SECTION 1: HEADER DETAILS -->
        <section id="header-details" class="bg-gray-50 p-6 rounded-lg grid grid-cols-1 md:grid-cols-4 gap-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" id="name" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
                <input type="text" id="address" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="date" class="block text-sm font-medium text-gray-700">Date</label>
                <input type="date" id="date" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="quoteNo" class="block text-sm font-medium text-gray-700">Quote No.</label>
                <input type="text" id="quoteNo" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </section>

        <!-- SECTION 2: SCOPE OF WORK -->
        <section id="scope" class="space-y-4">
            <label for="scope_text" class="block text-lg font-semibold text-gray-800">Scope of Work / Description</label>
            <textarea id="scope_text" rows="3" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 resize-y"></textarea>
        </section>

        <!-- SECTION 3: MATERIAL LIST (SEARCH) -->
        <section id="material-list" class="space-y-6">
            <h2 class="text-xl font-bold text-gray-800 border-b pb-2">Material List (Inventory Search)</h2>

            <!-- Search Input Area -->
            <div class="p-4 border rounded-md bg-indigo-50/50">
                <label for="search_material" class="block text-sm font-medium text-gray-700 mb-2">Search Material:</label>
                <input type="text" id="search_material" placeholder="Start typing to search materials..." 
                       class="w-full p-3 border-2 border-indigo-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition duration-150">
                <div id="material_suggestions" class="absolute z-10 bg-white border shadow-xl mt-1 max-h-[300px] overflow-y-auto w-full rounded-b-lg hidden">
                    <!-- Suggestions will appear here -->
                </div>
            </div>

            <!-- Selected Material Output Area (Table) -->
            <div class="border p-4 rounded-md bg-white">
                <h3 class="text-lg font-semibold mb-3 text-gray-700">Selected Items:</h3>
                <div id="material_items_container" class="space-y-4">
                    <!-- Selected material line items will be appended here -->
                     <p class="text-sm text-gray-500 italic" id="no_materials_selected">No materials selected yet.</p>
                </div>
            </div>
        </section>

        <!-- SECTION 4: ADDED ITEMS (MANUAL) -->
        <section id="added-items" class="space-y-6">
             <h2 class="text-xl font-bold text-gray-800 border-b pb-2">Added Items (Manual Entry)</h2>

            <!-- Manual Input Form -->
            <div class="bg-yellow-50 p-4 rounded-lg border border-dashed border-yellow-300 grid grid-cols-6 gap-4 items-end">
                <div class="col-span-2">
                    <label for="add_name" class="block text-sm font-medium text-gray-700">Item Name</label>
                    <input type="text" id="add_name" placeholder="e.g., Labor Service A" class="mt-1 block w-full p-2 border rounded-md">
                </div>
                <div>
                    <label for="add_qty" class="block text-sm font-medium text-gray-700">Quantity</label>
                    <input type="number" id="add_qty" placeholder="Qty" min="1" value="1" class="mt-1 block w-full p-2 border rounded-md">
                </div>
                 <div>
                    <label for="add_price" class="block text-sm font-medium text-gray-700">Price</label>
                    <input type="number" id="add_price" placeholder="Price" min="0.01" step="0.01" class="mt-1 block w-full p-2 border rounded-md">
                </div>
                <div class="col-span-6 flex justify-end space-x-3 pt-2">
                    <button id="add_item_btn" type="button" 
                            class="px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600 transition duration-150 shadow-md disabled:opacity-50">
                        + Add Item Manually
                    </button>
                </div>
            </div >

            <!-- Selected Added Items Output Area (Table) -->
            <div class="border p-4 rounded-md bg-white">
                 <h3 class="text-lg font-semibold mb-3 text-gray-700">Manually Added Materials:</h3>
                <div id="added_items_container" class="space-y-4">
                    <!-- Manually added line items will be appended here -->
                    <p class="text-sm text-gray-500 italic" id="no_manual_materials_selected">No materials manually added yet.</p>
                </div>
            </div>
        </section>


        <!-- SECTION 5: SUMMARY AND TOTALS -->
        <section id="summary" class="pt-8 border-t-4 border-indigo-200 bg-indigo-50 p-6 rounded-lg shadow-inner">
            <h2 class="text-2xl font-bold text-indigo-800 mb-6">Financial Summary</h2>

            <div class="grid grid-cols-3 gap-6">
                <!-- Column 1: Subtotal -->
                <div class="col-span-1 space-y-4 p-4 bg-white rounded-md shadow-sm border-l-4 border-indigo-500">
                    <p class="text-lg font-medium text-gray-600">Subtotal:</p>
                    <div id="summary_subtotal" class="text-3xl font-extrabold text-indigo-900">$0.00</div >
                </div>

                <!-- Column 2: VAT -->
                <div class="col-span-1 space-y-4 p-4 bg-white rounded-md shadow-sm border-l-4 border-yellow-500">
                    <p class="text-lg font-medium text-gray-600">VAT (12.5%):</p>
                    <div id="summary_vat" class="text-3xl font-extrabold text-yellow-700">$0.00</div >
                </div>

                <!-- Column 3: Markup & Total -->
                 <div class="col-span-1 space-y-4 p-4 bg-white rounded-md shadow-sm border-l-4 border-green-500">
                    <p class="text-lg font-medium text-gray-600">Markup (27.5%):</p>
                    <div id="summary_markup" class="text-3xl font-extrabold text-green-700">$0.00</div >

                    <hr class="border-t border-dashed mt-4">

                    <p class="text-xl font-bold text-gray-600">Overall Total:</p>
                    <div id="summary_overall_total" class="text-4xl font-extrabold text-indigo-800">$0.00</div >
                </div>
            </div>
        </section>

    </div>


<script>
    // =====================================================
    // 💡 GLOBAL STATE MANAGEMENT & CONFIGURATION
    // =====================================================

    // Array to hold all selected items (The state of the quote)
    let materialItems = []; // Items from the search list
    let addedItems = [];    // Manually entered items

    const VAT_RATE = 0.125;
    const MARKUP_RATE = 0.275;

    // --- UI Element References (for cleaner code) ---
    const elements = {
        searchInput: document.getElementById('search_material'),
        suggestionsContainer: document.getElementById('material_suggestions'),
        materialContainer: document.getElementById('material_items_container'),
        addedItemContainer: document.getElementById('added_items_container'),
        addButton: document.getElementById('add_item_btn'),

        // Summary elements
        subtotal: document.getElementById('summary_subtotal'),
        vat: document.getElementById('summary_vat'),
        markup: document.getElementById('summary_markup'),
        overallTotal: document.getElementById('summary_overall_total')
    };


    // =====================================================
    // 💰 UTILITY FUNCTIONS & DATA PARSING
    // =====================================================

    /** Formats a number into currency string format */
    const formatCurrency = (number) => {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(number);
    };

    /** Simple CSV parser function (Assumes data structure is consistent) */
    const parseCsvData = async (csvText) => {
         // Split the text into rows, handling potential empty lines
        let rows = csvText.trim().split('\n').filter(row => row.length > 0);

        if (rows.length === 0) return [];

        // Assuming the first row is the header and subsequent rows are data
        const headers = rows[0].split(',').map(h => h.trim()).filter(h => h !== '');
        let dataArray = [];

        for (let i = 1; i < rows.length; i++) {
            const values = rows[i].split(',');
            if (values.length === headers.length) {
                let obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index].trim();
                });
                dataArray.push(obj);
            }
        }

        return dataArray;
    };


    /** Fetches and processes materials from the Google Sheet CSV link */
    const fetchMaterials = async (query) => {
        // !!! IMPORTANT: This is client-side processing, inefficient for large sheets !!!
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQF-dVNCimVYFht-LgwEeKT4rEtW-IDphibc5oSV60YBjLxGn4KGT45nU2U58EfBCYbF0UdDxdoe88r/pub?gid=0&single=true&output=csv';

        // 1. Fetch the entire CSV content
        const response = await fetch(csvUrl);
        const csvText = await response.text();

        // 2. Parse the text into a JavaScript array of objects
        let allMaterials = await parseCsvData(csvText);

        // 3. Filter results client-side based on the query
        if (!query) return [];

        const lowerCaseQuery = query.toLowerCase();
        const filteredResults = allMaterials.filter(item => 
            (item['Name'] || '').toLowerCase().includes(lowerCaseQuery)
        );
        
        // 4. Transform and clean up the data structure for use in the app logic
        return filteredResults.map(item => ({
             name: item['Name'],
             unit: item['Unit'],
             price: parseFloat(item['Price']) || 0 // Ensure price is a float
        }));

        /* 
         * 🛠️ PRODUCTION NOTE: If this were production code, you would not fetch the whole CSV. 
         * You would send `query` to your Node/Python backend which would use the Google Sheets API's search endpoint 
         * (or a dedicated database) to find matches and return only small JSON objects.
         */
    };


    // =====================================================
    // ✨ CORE LOGIC 1: MATERIAL SEARCH & SELECTION (REMAINS THE SAME)
    // =====================================================

    /** Handles selection of an item from the search list */
    const selectMaterial = (item) => {
        // 1. Reset UI and clear suggestions
        elements.suggestionsContainer.innerHTML = '';
        elements.searchInput.value = '';

        // 2. Handle Quantity Defaulting
        let quantity = parseFloat(prompt(`Enter quantity for ${item.name} (${item.unit}):`, 1));
        if (isNaN(quantity) || quantity <= 0) {
            alert("Invalid quantity. Setting to 1.");
            quantity = 1;
        }

        // 3. Calculate and store item state
        const lineTotal = parseFloat((item.price * quantity).toFixed(2));

        materialItems.push({
            name: item.name,
            unit: item.unit,
            price: item.price,
            quantity: quantity,
            lineTotal: lineTotal
        });

        // 4. Render UI and recalculate totals
        renderMaterialItem(materialItems[materialItems.length - 1]);
        calculateSummary();
    };


    /** Renders the HTML for one selected material item */
    const renderMaterialItem = (item) => {
         elements.materialContainer.innerHTML = ''; // Clear previous items

         if (materialItems.length === 0) {
             elements.materialContainer.innerHTML = '<p class="text-sm text-gray-500 italic" id="no_materials_selected">No materials selected yet.</p>';
             return;
        }
        
         let htmlContent = '';
         materialItems.forEach((i, index) => {
            htmlContent += `
                <div class="flex justify-between items-center p-4 bg-gray-50 border border-indigo-200 rounded-md shadow-sm">
                    <div class="w-3/5 space-y-1">
                        <span class="font-semibold">${i.name}</span>
                        <span class="text-sm text-gray-600">${i.unit} (${formatCurrency(i.price)} / unit)</span>
                    </div>
                    <div class="w-1/5 flex items-center space-x-2">
                         <input type="number" value="${i.quantity}" min="1" class="w-full p-2 border rounded-md text-right qty_input" data-index="${materialItems.indexOf(i)}">
                    </div>
                    <div class="w-1/4 text-right font-bold text-xl text-indigo-700">${formatCurrency(i.lineTotal)}</div>
                </div>
            `;
         });

        elements.materialContainer.innerHTML = htmlContent;

        // Attach event listeners to the newly created quantity inputs for live updating
        document.querySelectorAll('.qty_input').forEach(input => {
             input.addEventListener('change', (e) => {
                const index = parseInt(e.target.getAttribute('data-index'));
                let newQty = parseFloat(e.target.value);

                if (isNaN(newQty) || newQty <= 0) {
                    alert("Quantity must be greater than zero.");
                    e.target.value = materialItems[index].quantity; // Revert value
                    return;
                }
                
                // Update state and UI
                materialItems[index].quantity = newQty;
                const newTotal = parseFloat((materialItems[index].price * newQty).toFixed(2));
                materialItems[index].lineTotal = newTotal;

                calculateSummary();
            });
        });


    // =====================================================
    // ✨ CORE LOGIC 2: MANUAL ADDED ITEMS (REMAINS THE SAME)
    // =====================================================
    
    /** Handles adding a manual item */
    const addManualItem = () => {
        const nameInput = document.getElementById('add_name');
        const qtyInput = document.getElementById('add_qty');
        const priceInput = document.getElementById('add_price');

        const name = nameInput.value.trim();
        let quantity = parseFloat(qtyInput.value);
        let price = parseFloat(priceInput.value);

        // Validation checks
        if (!name || isNaN(quantity) || quantity <= 0 || isNaN(price)) {
            alert("Please ensure all fields are filled correctly (Name, Qty > 0, Price >= 0).");
            return;
        }

        // Calculate and store item state
        const lineTotal = parseFloat((quantity * price).toFixed(2));

        addedItems.push({
            name: name,
            unit: 'Units', // Assuming a generic unit for manual entry
            price: price,
            quantity: quantity,
            lineTotal: lineTotal
        });
        
        // Render UI and recalculate totals
        renderAddedItem(addedItems[addedItems.length - 1]);
        calculateSummary();

        // Clear inputs for the next entry
        nameInput.value = '';
        qtyInput.value = '1';
        priceInput.value = '';
    };


    /** Renders the HTML for one manually added item */
    const renderAddedItem = (item) => {
         elements.addedItemContainer.innerHTML = ''; // Clear previous items

        if (addedItems.length === 0) {
             elements.addedItemContainer.innerHTML = '<p class="text-sm text-gray-500 italic" id="no_manual_materials_selected">No materials manually added yet.</p>';
            return;
        }
        
         let htmlContent = '';
         addedItems.forEach((i) => {
             htmlContent += `
                <div class="flex justify-between items-center p-4 bg-yellow-50 border border-yellow-200 rounded-md shadow-sm">
                    <div class="w-3/5 space-y-1">
                        <span class="font-semibold">${i.name}</span>
                        <span class="text-sm text-gray-600">${i.unit}: ${formatCurrency(i.price)} / unit</span>
                    </div>
                    <div class="w-2/5 flex items-center space-x-2">
                         <input type="number" value="${i.quantity}" min="1" class="w-full p-2 border rounded-md text-right qty_input" data-index="${addedItems.indexOf(i)}">
                    </div>
                    <div class="w-1/4 text-right font-bold text-xl text-indigo-700">${formatCurrency(i.lineTotal)}</div>
                </div>
            `;
        });

        elements.addedItemContainer.innerHTML = htmlContent;

        // Attach event listeners for quantity changes
        document.querySelectorAll('.qty_input').forEach(input => {
             input.addEventListener('change', (e) => {
                const index = parseInt(e.target.getAttribute('data-index'));
                let newQty = parseFloat(e.target.value);

                if (isNaN(newQty) || newQty <= 0) {
                    alert("Quantity must be greater than zero.");
                    e.target.value = addedItems[index].quantity; // Revert value
                    return;
                }
                
                // Update state and UI
                addedItems[index].quantity = newQty;
                const newTotal = parseFloat((addedItems[index].price * newQty).toFixed(2));
                addedItems[index].lineTotal = newTotal;

                calculateSummary();
            });
        });

    }


    // =====================================================
    // 📊 CORE LOGIC 3: SUMMARY CALCULATIONS (REMAINS THE SAME)
    // =====================================================

    /** Calculates and updates all summary fields based on current state */
    const calculateSummary = () => {
        let subtotal = 0;

        // 1. Calculate Subtotal from Materials
        materialItems.forEach(item => {
            subtotal += item.lineTotal;
        });

        // 2. Calculate Subtotal from Added Items
        addedItems.forEach(item => {
            subtotal += item.lineTotal;
        });

        // 3. Apply Rates
        const vatAmount = subtotal * VAT_RATE;
        const markupAmount = subtotal * MARKUP_RATE;
        const overallTotal = subtotal + vatAmount + markupAmount;

        // 4. Update UI (Display)
        elements.subtotal.textContent = formatCurrency(subtotal);
        elements.vat.textContent = formatCurrency(vatAmount);
        elements.markup.textContent = formatCurrency(markupAmount);
        elements.overallTotal.textContent = formatCurrency(overallTotal);
    };


    // =====================================================
    // 🔄 INITIALIZATION & EVENT BINDING
    // =====================================================

    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = elements.searchInput;
        const suggestionsContainer = elements.suggestionsContainer;
        elements.addButton.addEventListener('click', addManualItem);


        /** Handles the Material Search Autocomplete Logic */
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const query = e.target.value;

            // Show/Hide suggestions container based on input length
            if (query.length < 2) {
                 elements.suggestionsContainer.classList.add('hidden');
                 return;
            }
            
            // Debounce the API call
            debounceTimer = setTimeout(async () => {
                try {
                    const results = await fetchMaterials(query);
                    displaySuggestions(results, e.target);
                } catch (error) {
                    console.error("API Fetch Error:", error);
                    alert("Error connecting to the material database. Check console for details.");
                }
            }, 300);
        });


        /** Displays the fetched results in the suggestions dropdown */
        const displaySuggestions = (results, sourceElement) => {
             elements.suggestionsContainer.innerHTML = '';

            if (results.length === 0) {
                 elements.suggestionsContainer.classList.add('hidden');
                return;
            }

            let html = '<div class="p-2"></div>'; // Padding div for aesthetics

            results.forEach(item => {
                html += `
                    <button type="button" data-material='${JSON.stringify(item)}' 
                            class="w-full text-left px-4 py-3 cursor-pointer hover:bg-indigo-100 transition duration-150 border-b last:border-b-0">
                        <div class="flex justify-between items-center">
                            <span>${item.name}</span>
                            <span class="text-sm text-gray-500">${item.unit} @ ${formatCurrency(item.price)}</span>
                        </div>
                    </button>
                `;
            });

            elements.suggestionsContainer.innerHTML = html;
            elements.suggestionsContainer.classList.remove('hidden');

            // Attach click listener to all generated buttons
            elements.suggestionsContainer.querySelectorAll('button').forEach(button => {
                button.addEventListener('click', (e) => {
                    const materialData = JSON.parse(e.currentTarget.getAttribute('data-material'));
                    selectMaterial(materialData);
                    // Hide suggestions after selection
                    elements.suggestionsContainer.classList.add('hidden'); 
                });
            });
        });

    });
</script>
</body>
</html>
